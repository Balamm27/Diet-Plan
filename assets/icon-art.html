<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --pink: #ff5e93;
      --peach: #ffb36a;
      --mint: #86efc6;
      --sky: #cbf3ff;
      --ink: #1c2430;
      --cream: #fff8f3;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 1024px;
      height: 1024px;
      margin: 0;
      overflow: hidden;
      font-family: "Arial Rounded MT Bold", "Avenir Next", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.85), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.45), transparent 30%),
        linear-gradient(145deg, #ffe7ef 0%, #fff0dd 48%, #e8fff5 100%);
    }
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 220px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(134,239,198,0.55), transparent 32%),
        radial-gradient(circle at bottom left, rgba(255,94,147,0.3), transparent 30%),
        linear-gradient(160deg, rgba(255,255,255,0.92), rgba(255,248,243,0.82));
    }
    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(2px);
      opacity: .9;
    }
    .orb.one { width: 260px; height: 260px; background: rgba(255,94,147,.28); top: 82px; right: 90px; }
    .orb.two { width: 230px; height: 230px; background: rgba(134,239,198,.35); bottom: 120px; left: 88px; }
    .orb.three { width: 170px; height: 170px; background: rgba(255,179,106,.24); bottom: 160px; right: 130px; }
    .card {
      position: absolute;
      inset: 110px;
      border-radius: 120px;
      background: linear-gradient(160deg, rgba(255,255,255,.86), rgba(255,255,255,.58));
      border: 2px solid rgba(255,255,255,.7);
      box-shadow: 0 40px 80px rgba(107, 73, 93, 0.16);
    }
    .badge {
      position: absolute;
      top: 160px;
      left: 160px;
      padding: 18px 30px;
      border-radius: 999px;
      background: rgba(255,94,147,.12);
      color: var(--pink);
      font-size: 38px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .plate {
      position: absolute;
      width: 360px;
      height: 360px;
      left: 332px;
      top: 242px;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(255,255,255,.96), rgba(255,247,239,.88));
      box-shadow: inset 0 0 0 18px rgba(255,94,147,.1), 0 24px 46px rgba(95, 71, 58, 0.15);
    }
    .salad {
      position: absolute;
      inset: 58px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #86efc6 0 16%, transparent 17%),
        radial-gradient(circle at 60% 30%, #ffb36a 0 14%, transparent 15%),
        radial-gradient(circle at 50% 62%, #cbf3ff 0 17%, transparent 18%),
        radial-gradient(circle at 30% 60%, #ff7cab 0 13%, transparent 14%),
        radial-gradient(circle at 72% 58%, #88e0a6 0 14%, transparent 15%),
        linear-gradient(180deg, #f7fff9, #eefaf3);
      box-shadow: inset 0 0 0 10px rgba(134,239,198,.22);
    }
    .fork, .spoon {
      position: absolute;
      top: 290px;
      width: 30px;
      height: 330px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffdfe9, #ffffff);
      box-shadow: 0 18px 24px rgba(90, 73, 73, 0.14);
    }
    .fork { left: 255px; }
    .spoon { right: 255px; }
    .fork::before, .fork::after, .spoon::before {
      content: "";
      position: absolute;
      background: inherit;
    }
    .fork::before {
      top: -44px;
      left: -12px;
      width: 14px;
      height: 58px;
      border-radius: 999px;
      box-shadow:
        18px 0 0 0 rgba(255,255,255,.98),
        36px 0 0 0 rgba(255,255,255,.98),
        54px 0 0 0 rgba(255,255,255,.98);
    }
    .fork::after {
      top: 0;
      left: 0;
      width: 30px;
      height: 40px;
      border-radius: 999px;
    }
    .spoon::before {
      top: -56px;
      left: -23px;
      width: 76px;
      height: 96px;
      border-radius: 50%;
    }
    .title {
      position: absolute;
      left: 174px;
      bottom: 178px;
      color: var(--ink);
      font-size: 92px;
      line-height: .92;
      letter-spacing: -.06em;
      font-weight: 800;
    }
    .spark {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: linear-gradient(145deg, #fff, rgba(255,255,255,.3));
      transform: rotate(45deg);
      box-shadow: 0 0 20px rgba(255,255,255,.9);
    }
    .spark.a { top: 210px; right: 220px; }
    .spark.b { bottom: 230px; right: 210px; width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
    <div class="card"></div>
    <div class="badge">diet plan</div>
    <div class="fork"></div>
    <div class="spoon"></div>
    <div class="plate"><div class="salad"></div></div>
    <div class="spark a"></div>
    <div class="spark b"></div>
    <div class="title">Glow<br>Fuel</div>
  </div>
</body>
</html>
